steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/user-interface', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/user-interface']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - user-interface
      - --image=gcr.io/$PROJECT_ID/user-interface
      - --region=us-central1
      - --platform=managed

options:
  logging: CLOUD_LOGGING_ONLY